<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#111827" />
    <meta name="description" content="Todo List Tree en Leptos + Rust + WebAssembly" />
    <link data-trunk rel="copy-file" href="manifest.webmanifest" />
    <link data-trunk rel="copy-file" href="sw.js" />
    <link data-trunk rel="copy-file" href="icons/icon.svg" />
    <link data-trunk rel="copy-file" href="icons/icon-maskable.svg" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <title>Todo Tree v3</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
      window.requestGoogleDriveToken = async function (clientId, scope) {
        console.log("[Drive OAuth] requestGoogleDriveToken:start", {
          clientId,
          scope,
          origin: window.location.origin,
          href: window.location.href,
        });
        if (!window.google?.accounts?.oauth2) {
          console.error("[Drive OAuth] GIS non chargé");
          throw new Error("Google Identity Services n'est pas chargé");
        }
        return await new Promise((resolve, reject) => {
          const client = window.google.accounts.oauth2.initTokenClient({
            client_id: clientId,
            scope,
            callback: (response) => {
              console.log("[Drive OAuth] callback", response);
              if (response?.access_token) {
                console.log("[Drive OAuth] access_token reçu", {
                  tokenPreview: `${response.access_token.slice(0, 12)}...`,
                  expiresIn: response.expires_in,
                  scope: response.scope,
                  tokenType: response.token_type,
                });
                resolve(response.access_token);
              } else {
                console.error("[Drive OAuth] callback sans token", response);
                reject(new Error(response?.error || "Accès refusé"));
              }
            },
            error_callback: (error) => {
              console.error("[Drive OAuth] error_callback", error);
              reject(new Error(error?.message || "Erreur Google Identity Services"));
            },
          });
          console.log("[Drive OAuth] requestAccessToken:consent");
          client.requestAccessToken({ prompt: "consent" });
        });
      };
    </script>
    <style>
      :root {
        color-scheme: light;
        --bg-start: #f8fafc;
        --bg-end: #eef2ff;
        --text: #0f172a;
        --panel-bg: rgba(255, 255, 255, 0.88);
        --panel-border: #dbe4f0;
        --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        --field-bg: #ffffff;
        --field-text: #0f172a;
        --field-border: #cbd5e1;
        --button-primary: #2563eb;
        --button-secondary: #e2e8f0;
        --button-secondary-text: #0f172a;
        --button-danger: #dc2626;
        --button-text: #ffffff;
        --node-bg: #f8fafc;
        --children-border: #cbd5e1;
        --muted: #475569;
        --badge-bg: #e2e8f0;
        --badge-text: #334155;
        --depth-badge-bg: #dbeafe;
        --body-secondary-text: #334155;
      }
      :root[data-theme="dark"] {
        color-scheme: dark;
        --bg-start: #09111f;
        --bg-end: #0b1020;
        --text: #e5e7eb;
        --panel-bg: #121a31;
        --panel-border: #24304f;
        --shadow: 0 10px 30px rgba(0, 0, 0, .25);
        --field-bg: #0b1020;
        --field-text: #ffffff;
        --field-border: #334155;
        --button-primary: #1d4ed8;
        --button-secondary: #1f2937;
        --button-secondary-text: #ffffff;
        --button-danger: #b91c1c;
        --button-text: #ffffff;
        --node-bg: #0f172a;
        --children-border: #334155;
        --muted: #94a3b8;
        --badge-bg: #1f2937;
        --badge-text: #cbd5e1;
        --depth-badge-bg: #1e293b;
        --body-secondary-text: #cbd5e1;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, sans-serif;
        background: linear-gradient(180deg, var(--bg-start) 0%, var(--bg-end) 100%);
        color: var(--text);
      }
      .app { max-width: 1180px; margin: 0 auto; padding: 24px; }
      .panel {
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        padding: 16px;
        box-shadow: var(--shadow);
      }
      .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      .compact-row { gap: 6px; }
      .grow { flex: 1; min-width: 160px; }
      input[type="text"], textarea, select {
        width: 100%;
        padding: 10px 12px;
        background: var(--field-bg);
        color: var(--field-text);
        border: 1px solid var(--field-border);
        border-radius: 10px;
      }
      select.status-select { width: auto; min-width: 110px; }
      textarea.code { min-height: 220px; font-family: ui-monospace, monospace; }
      textarea.detail-textarea { min-height: 84px; margin-top: 8px; font-family: inherit; }
      button {
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--field-border);
        background: var(--button-primary);
        color: var(--button-text);
        cursor: pointer;
      }
      button.secondary {
        background: var(--button-secondary);
        color: var(--button-secondary-text);
      }
      button.danger { background: var(--button-danger); }
      button.tiny { padding: 6px 8px; font-size: 12px; }
      button.active { outline: 2px solid #93c5fd; }
      button:disabled { opacity: .45; cursor: not-allowed; }
      .node-wrap { margin-top: 8px; }
      .node-card {
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 10px;
        background: var(--node-bg);
      }
      .dragging-node {
        opacity: .6;
      }
      .drop-target-active {
        outline: 2px solid #60a5fa;
        outline-offset: 1px;
      }
      .drag-handle {
        cursor: grab;
        user-select: none;
      }
      .drag-handle:active {
        cursor: grabbing;
      }
      .children { border-left: 2px solid var(--children-border); margin-left: 14px; padding-left: 10px; }
      .done { text-decoration: line-through; opacity: .65; }
      .muted { color: var(--muted); font-size: .9rem; }
      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 22px;
        height: 22px;
        padding: 0 8px;
        border-radius: 999px;
        background: var(--badge-bg);
        color: var(--badge-text);
        font-size: 12px;
      }
      .depth-badge { background: var(--depth-badge-bg); }
      .title-text { font-weight: 600; }
      .meta-stack { display: grid; gap: 8px; margin-top: 10px; }
      .editor-block { margin-top: 10px; }
      .action-row { margin-top: 8px; }
      .node-description {
        margin: 0;
        color: var(--body-secondary-text);
        white-space: pre-wrap;
        line-height: 1.35;
      }
      .tags-row, .links-row { gap: 6px; }
      .tag-badge, .link-chip, .status-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 3px 10px;
        font-size: 12px;
        border: 1px solid transparent;
      }
      .tag-badge {
        background: rgba(59, 130, 246, .14);
        color: #1e3a8a;
        border-color: rgba(59, 130, 246, .28);
      }
      .link-chip {
        background: rgba(16, 185, 129, .12);
        color: #065f46;
        border-color: rgba(16, 185, 129, .25);
        text-decoration: none;
      }
      .status-todo {
        background: rgba(148, 163, 184, .16);
        color: #334155;
        border-color: rgba(148, 163, 184, .28);
      }
      .status-done {
        background: rgba(34, 197, 94, .16);
        color: #166534;
        border-color: rgba(34, 197, 94, .28);
      }
      .status-in-progress {
        background: rgba(245, 158, 11, .16);
        color: #92400e;
        border-color: rgba(245, 158, 11, .28);
      }
      .status-idea {
        background: rgba(168, 85, 247, .16);
        color: #6b21a8;
        border-color: rgba(168, 85, 247, .28);
      }
      .status-blocked {
        background: rgba(239, 68, 68, .16);
        color: #991b1b;
        border-color: rgba(239, 68, 68, .28);
      }
      :root[data-theme="dark"] .tag-badge {
        color: #bfdbfe;
      }
      :root[data-theme="dark"] .link-chip {
        color: #bbf7d0;
      }
      :root[data-theme="dark"] .status-todo {
        color: #e2e8f0;
      }
      :root[data-theme="dark"] .status-done {
        color: #bbf7d0;
      }
      :root[data-theme="dark"] .status-in-progress {
        color: #fde68a;
      }
      :root[data-theme="dark"] .status-idea {
        color: #e9d5ff;
      }
      :root[data-theme="dark"] .status-blocked {
        color: #fecaca;
      }
      h1, h2, p { margin-top: 0; }
      @media (max-width: 720px) {
        .app { padding: 14px; }
        .grow { min-width: 100%; }
      }
    </style>
  </head>
  <body></body>
</html>
